<!doctype html>
<html>
  <head>
    <title>Blogging Application</title>
    <link rel="stylesheet" href="blogStyle.css" />
  </head>
  <body>
    <div class="container">
      <h1>My blog App</h1>

      <!-- blog from -->
      <div class="blog-form">
        <input type="text" id="title" placeholder="Enter blog title" />

        <textarea id="content" placeholder="Write your blog here..."></textarea>

        <button id="addBtn">Add Blog</button>
      </div>

      <!-- blog list -->

      <div id="blogList"></div>
    </div>

    <script src="blogScript.js"></script>
  </body>
</html>
